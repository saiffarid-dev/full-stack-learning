<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advace html</title>
</head>
<body>
    <form>
        <label for="name">Name</label> 
        <input type="text" placeholder="Enter your Name">
        <br>
        <br>
        <label for="age">Age:</label>  <!--label k for used form k box k bhar output show kre box kise liye hai-->
        <input id="age" type="number" placeholder="Enter your age">
        <br>
        <br>
        <label for="car">Select your Car</label>
        <select name="car" id="Cars">
            <option value="">Mahindra</option>
            <option value="">Scarpio</option>
            <option value="">Buggati</option>
            <option value="">Bmw</option>
            <option value="">Thar</option>
        </select>
        <br><br>
        <fieldset>
            <legend>Name</legend>
            <input type="text" placeholder="Frist Name" disabled/>
            <input type="text" placeholder="Middle Name" required/> <!-- ye line bina flip kiye submt nhi hogy-->
            <input type="text" placeholder="last Name">
        </fieldset>
        <input type="text" list="states">
        <datalist id="states">
            <option value="alpha"></option>
            <option value="bita"></option>
            <option value="gama"></option>
        </datalist>
        <input type="submit" value="submit"
        <br><br>
        <iframe src="https://www.youtube.com/embed/videoID" width="100%" frameborder="400"></iframe>
        <br>
        <video width="500" controls>
        <source src="media/english video.mp4"> Your browser does not support the video tag.</video>
    </form>
</body>
</html>
