<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advace html</title>
</head>
<body>
    <form>
        <label for="name">Name</label> 
        <input id="name" type="text" placeholder="Enter your Name">
        <br>
        <br>
        <label for="age">Age:</label>  <!--label k for used form k box k bhar output show kre box kise liye hai-->
        <input id="age" type="number" placeholder="Enter your age">
        <br>
        <br>
        <textarea name="" id="" cols="20" rows="7" placeholder="Enter your Address"></textarea>
        <br>
        <br>
        <label for="car">Select your Car</label>
        <select name="car" id="Cars">
            <option value="">Mahindra</option>
            <option value="">Scarpio</option>
            <option value="">Buggati</option>
            <option value="">Bmw</option>
            <option value="">Thar</option>
        </select>
        <br><br>
        <fieldset>
            <legend>Name</legend>
            <input type="text" placeholder="Frist Name" disabled/>
            <input type="text" placeholder="Middle Name" required/> <!-- ye line bina flip kiye submt nhi hogy-->
            <input type="text" placeholder="last Name">
        </fieldset>
        <input type="text" list="states">
        <datalist id="states">
            <option value="Bihar"></option>
            <option value="Delhi"></option>
            <option value="Banglor"></option>
        </datalist>
        <input type="submit" value="submit">
        <br><br>
        <iframe src="https://www.youtube.com/embed/videoID" width="100%" frameborder="400"></iframe>
        <br>
        <video width="500" controls>
        <source src="media/english video.mp4"> Your browser does not support the video tag.</video>
        <br>
        <audio controls>
            <source src="media/song.mp3" type="audio/mpeg">
        </audio>
        <br>
        <iframe src="https://www.wikipedia.org" width="100%" height="500" framborder="0"></iframe>
        <br>
        <table>
            <tr>
                <th>Company</th>
                <th>Contact</th>
                <th>Country</th>
            </tr>
            <tr>
                <td>Google</td>
                <td>Sunder Piche</td>
                <td>America</td>
            </tr>
        </table>
        <br>
        <ul>
            <li>Milk</li>
            <li>Mango</li>
            <li>Apple</li>
            <li>Chocolate</li>
            <li>PineApple</li>
        </ul>
    </form>
</body>
</html>
