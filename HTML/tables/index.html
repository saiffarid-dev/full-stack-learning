<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Table Practice</title>
</head>
<body>
    <h1>Student Information Table</h1>
    <table border="1">
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Course</th>
        </tr>
        <tr>
            <td>101</td>
            <td>Saif</td>
            <td>Html</td>
        </tr>
        <tr>
            <td>102</td>
            <td>Ali</td>
            <td>Css</td>
        </tr>
        <tr>
            <td>103</td>
            <td>farid</td>
            <td>PYTHON</td>
        </tr>
    </table>
    <br>
    <h2>Colspan Example</h2>
    <table border="1">
        <tr>
            <th colspan="2">
                Student Details
            </th>
        </tr>
        <tr>
            <td>Name</td>
            <td>Saif</td>
        </tr>
    </table>
</body>
</html>
