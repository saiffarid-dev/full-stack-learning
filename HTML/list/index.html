<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>List Practice</title>
</head>
<body>
    <h1>Unordered List</h1>
    <ul>
        <li>HTML</li>
        <li>CSS</li>
        <li>JavaScript</li>
    </ul>
    <h1>Ordered List</h1>
    <ol>
        <li>Learn Html</li>
        <li>Learn CSS</li>
        <li>Learn JavaScript</li>
    </ol>
    <h1>Nested List</h1>
    <ul>
        <ul>Fronted</ul>
        <ul>
            <li>HTML</li>
            <li>CSS</li>
            <li>JavaScript</li>
            <li>React</li>
        </ul>
    </ul>
</body>
</html>
