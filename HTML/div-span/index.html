<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Div and Span Practices</title>
</head>
<body>
    <div>
        <h1>Student Profile</h1>
        <P>Welcome to studnet dashboard</P>
    </div>
    <hr>
    <div>
        <h2>Personal Information</h2>
        <p>
            Name : Prince
        </p>
        <p>
            Age :20
        </p>
        <p>
            City: Delhi
        </p>
    </div>
    <hr>
    <h2>Span Examples</h2>
    <p>
        My Favorite language is 
        <span>
            Html
        </span>
    </p>
    <p>
        Learning
        <span>
            Frontend Development
        </span>
        is fun.
    </p>
    <hr>
    <div></div>
        <h2>Mini Product Card</h2>
        <img src="..media/picture" alt="picture" width="200">
        <h3>Laptop</h3>
        <p>
            Prince: 50,000
        </p>
        <button>
            Buy Now
        </button>
    </div>
</body>
</html>
