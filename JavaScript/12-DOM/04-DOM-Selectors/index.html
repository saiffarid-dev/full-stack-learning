<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DOM Selectors</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!---===================- 1. getElementsById--------------==========-->

    <h1 id="heading">Welcome to DOM</h1>
    <button id="btn">Click Me</button>
    <hr>

    <!---  --================ 2.  getElementBycClassId() ---========================-->

    <h2 class="course">HTML</h2>
    <h2 class="course">CSS</h2>
    <h2 class="course">JavaScript</h2>

    <hr>
    <!---======================== 3. getElementByTagName() ==========================-->

    <p>Paragraph 1</p>
    <p>Paragraph 2</p>
    <p>Paragraph 3</p>
    <hr>

    <!----====================== 4.  querySelector() ===========================-->

    <h3 class="title">Learning DOM"</h3>
    <button class="btn">Submit</button>
    
    <hr>

    <!------===================== 5. querySelectorAll() =========================-->

    <li class="language">Python</li>
    <li class="language">Java</li>
    <li class="language">JavaScript</li>

    <script src="script.js"></script>
</body>
</html>
