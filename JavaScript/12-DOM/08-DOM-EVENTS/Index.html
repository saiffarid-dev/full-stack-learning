<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>Dom-Events</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!----============= 1.Click  ===============-->
    <button id="clickBtn">Click Me</button>
    <hr>
    <!--- ================== 2.Double Click =================-->
    <button id="dblBtn">Double Click</button>
    <hr>
    <!--============= 3. Mouse Events =============-->
    <div id="box">Hover Here</div>

    <hr>
    <!-- =============== 4. Keyboard =================-->
    <input type="text" id="keyboard" placeholder="Type Something">

    <hr>

    <!--- =========== 5. Focus / Blur ===============-->

    <input type="text" id="focusBox" placeholder="Focus Here">

    <hr>

    <!--================ 6. Change ==============-->

    <select id="course">
        <option>HTML</option>
        <option>CSS</option>
        <option>JavaScript</option>

    </select>

    <hr>

    <!---========================= 7.  Submit ==============-->
    <from id="myForm">
        <input type="text" placeholder="Name">
        <buttom>Submit</buttom>
    </from>
    <script src="script.js"></script>
</body>
</html>
